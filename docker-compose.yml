services:
  app:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
    environment:
      VITE_GROQ_API_KEY: ${VITE_GROQ_API_KEY:-}
    command: npm run dev -- --host 0.0.0.0
